<!DOCTYPE html>
<html>

<head>
    <script type="module">
        import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';

        let gl;
        let Time = 0;
        let fractalType = 0;
        let offset = [0.0, 0.0]
        let hold_position = [null, null]
        let zoom = 1.0;
        let isDown = false;
        let F_Height = 0;
        let F_Width = 0;
        let isPause = false;
        let isShadersLoaded = false;
        let startTime;
        let i;
        const PARAMS = {
                color1: {r: 1,g: 1,b: 1},
                color2: {r: 1,g: 1,b: 1}
            };

        const pane = new Pane({
            title: "ColorPicker"
        });

        pane.addBinding(PARAMS, 'color1', {
            label: 'Box Color1',
            color: {type: 'int'}
        });
        pane.addBinding(PARAMS, 'color2', {
            label: 'Box Color1',
            color: {type: 'int'}
        });

        function initGL(canvas) {
            gl = canvas.getContext("webgl2");

            gl.viewportWidth = canvas.width;
            gl.viewportHeight = canvas.height;
        }

        let shaderVs;
        let shaderFs;
        
        function GetShaderText( ShaderName ) {
            fetch(ShaderName)
                .then(response => response.text())
                .then((data) => {
                    return data;
                })
            }

        function getShader(shaderStr, type) {
            const shader = gl.createShader(type);

            gl.shaderSource(shader, shaderStr);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                alert(gl.getShaderInfoLog(shader));
            }

            return shader;
        }

        let u_time_location;
        let u_fractal_type_location;
        let u_zoom_location;
        let u_offset_location;
        let u_color1_location;
        let u_color2_location;

        function initShaders() {
            Promise.all([
                 fetch("./fractal.vert").then(response => response.text()).then((data) => getShader(data, gl.VERTEX_SHADER)),
                 fetch("./fractal.frag").then(response => response.text()).then((data) => getShader(data, gl.FRAGMENT_SHADER))
            ]).then((shaders) => {
                const vs = shaders[0];
                const fs = shaders[1];

                const program = gl.createProgram();
                gl.attachShader(program, vs);
                gl.attachShader(program, fs);
                gl.linkProgram(program);

                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    alert("Program linkage error");
                }

                gl.useProgram(program);

                u_time_location = gl.getUniformLocation(program, "u_time");
                u_fractal_type_location = gl.getUniformLocation(program, "u_fractal_type");
                u_offset_location = gl.getUniformLocation(program, "u_offset");
                u_zoom_location = gl.getUniformLocation(program, "u_zoom");
                u_color1_location = gl.getUniformLocation(program, "u_color1");
                u_color2_location = gl.getUniformLocation(program, "u_color2");

                isShadersLoaded = true;
            })
        }

        let vertexBuffer;

        function initBuffer() {
            vertexBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
            let vertices = [-1, 3, -1, -1, 3, -1];
            gl.bufferData(
                gl.ARRAY_BUFFER,
                new Float32Array(vertices),
                gl.STATIC_DRAW
            );
        }

        function drawScene() {
            gl.clearColor(0, 0, 1, 1);
            gl.viewport(0, 0, gl.viewportWidth, gl.viewportHeight);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.enableVertexAttribArray(0);
            gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

            if (isShadersLoaded)
            {
                let currentTime = new Date().getMilliseconds();
                let deltaTime = Math.min(Math.abs(startTime - currentTime), 1000 - Math.abs(startTime - currentTime));
                startTime = currentTime;

                //console.log(deltaTime);

                if (!isPause)
                    Time += deltaTime;
                gl.uniform1f(u_time_location, Time / 10.0);
                gl.uniform1i(u_fractal_type_location, fractalType);
                gl.uniform2f(u_offset_location, offset[0], offset[1]);
                gl.uniform1f(u_zoom_location, zoom);
                gl.uniform3f(u_color1_location, PARAMS.color1.r / 256.0, PARAMS.color1.g / 256.0, PARAMS.color1.b / 256.0);
                gl.uniform3f(u_color2_location, PARAMS.color2.r / 256.0, PARAMS.color2.g / 256.0, PARAMS.color2.b / 256.0);

                gl.drawArrays(gl.TRIANGLES, 0, 3);
            }
            window.requestAnimationFrame(drawScene);
        }

        function onStart() {
            let canvas = document.getElementById("webgl-canvas");
            let button = document.getElementById("fractial-button");

            canvas.width = F_Width;
            canvas.height = F_Height;

            canvas.onmousemove = (ev) => {
                //console.log(`pos:(${ev.x}, ${ev.y})\noffset:(${offset[0]}, ${offset[1]})\nhold_position:(${hold_position[0]}, ${hold_position[1]})`);
                if (isDown)
                {
                    if (hold_position[0] == null)
                        hold_position = [ev.x, ev.y]
                    else
                    {
                        offset[0] += (hold_position[0] - ev.x) / F_Width * 2;
                        offset[1] -= (hold_position[1] - ev.y) / F_Height * 2;
                        hold_position = [ev.x, ev.y];
                    }
                }
            };

            canvas.onmousedown = (ev) => {
                hold_position = [ev.x, ev.y]
                isDown = true;
            };

            canvas.onmouseup = (ev) => {
                isDown = false;
                //console.info(ev);
            };

            canvas.onwheel = (ev) => {
                let zoom_value = ev.wheelDelta * zoom;

                let zoom_ratio = 1 + zoom_value / zoom / 1000.0;

                offset[0] -= (0.5 - ev.x / F_Width) * (zoom_ratio - 1) * 2;
                offset[1] += (0.5 - ev.y / F_Height) * (zoom_ratio - 1) * 2;

                zoom += zoom_value / 1000.0;

                offset[0] = offset[0] * zoom_ratio;
                offset[1] = offset[1] * zoom_ratio;           
            };

            window.addEventListener('keydown', (event) => {
                // Check which key was pressed using event.key or event.code
                if (event.code === 'Space') {
                    isPause = !isPause;
                }
            });

            F_Width = window.innerWidth;
            F_Height = window.innerHeight;

            canvas.width = F_Width * 0.8;
            canvas.height = F_Height * 0.95;

            initGL(canvas);

            initShaders();

            initBuffer();

            startTime = new Date().getMilliseconds();
            drawScene();
        }

        function changeFractal() {
            fractalType = (fractalType + 1) % 2;
        }
        window.changeFractal = changeFractal;

        function resizeHandler() {
            let canvas = document.getElementById("webgl-canvas");
            let button = document.getElementById("fractial-button");

            F_Width = window.innerWidth;
            F_Height = window.innerHeight;

            canvas.width = F_Width * 0.8;
            canvas.height = F_Height * 0.95;

            initGL(canvas);

            initShaders();

            initBuffer();
        }
        window.resizeHandler = resizeHandler;

        window.onload = (ev) => {
            onStart();
        }
    </script>
</head>

<body onresize="resizeHandler()" style="background-color: black;">
    <div class="container" style="display: flex;">
        <canvas id="webgl-canvas" style="border: none; text-align: left;" class="box"></canvas>

        <div style="flex-direction: column;">
            <button id="fractial-button" onclick="changeFractal()" style="text-align: right;">Change Fractal</button>
        </div>
    </div>
</body>

</html>
